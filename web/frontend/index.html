<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎙️ 语音通话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .server-input {
            margin-bottom: 20px;
        }

        .server-input label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .server-input input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .server-input input:focus {
            outline: none;
            border-color: #4ade80;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ade80;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-text {
            font-size: 16px;
            color: #aaa;
        }

        .status-text.connected {
            color: #4ade80;
        }

        .status-text.error {
            color: #f87171;
        }

        .users-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .users-list h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .user-item.speaking {
            background: rgba(74, 222, 128, 0.2);
            border-left: 3px solid #4ade80;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 18px;
        }

        .user-name {
            flex: 1;
            font-size: 15px;
        }

        .user-status {
            font-size: 12px;
            color: #888;
        }

        .call-controls {
            display: none;
        }

        .call-controls.active {
            display: block;
        }

        .mic-indicator {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .mic-indicator.muted {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .join-form {
            display: block;
        }

        .join-form.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .hint {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }

        .connection-info {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #4ade80;
        }

        .volume-meter {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .volume-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            width: 0%;
            transition: width 0.1s;
        }

        /* 屏幕共享/摄像头区域 */
        .screen-share-area {
            display: none;
            margin-top: 16px;
        }

        .screen-share-area.active {
            display: block;
        }

        .screen-share-area h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .video-wrapper video {
            width: 100%;
            max-height: 220px;
            display: block;
            object-fit: contain;
            background: #111;
        }

        .video-label {
            position: absolute;
            bottom: 6px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .btn-share {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
        }

        .btn-share:hover {
            opacity: 0.85;
        }

        .btn-share.sharing {
            background: linear-gradient(135deg, #f97316, #ea580c);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
        }

        .btn-fullscreen.active {
            background: linear-gradient(135deg, #ec4899, #db2777);
        }

        /* 全屏模式 */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            cursor: crosshair;
        }

        .fullscreen-overlay.active {
            display: flex;
            flex-direction: column;
        }

        .fullscreen-overlay video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fullscreen-toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 30px;
        }

        .fullscreen-toolbar button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .fullscreen-toolbar button:hover {
            background: rgba(255,255,255,0.3);
        }

        .fullscreen-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* 控制模式指示器 */
        .control-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(74, 222, 128, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }

        .control-indicator.active {
            display: block;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 语音通话</h1>
        <p class="subtitle">P2P通话</p>

        <!-- 连接状态 -->
        <div class="status-bar">
            <div class="status-text" id="status">准备连接信令服务器</div>
            <div class="connection-info" id="connectionInfo">
                请先输入信令服务器地址
            </div>
        </div>

        <!-- 服务器地址 -->
        <div class="server-input">
            <label>📡 信令服务器地址</label>
            <input type="text" id="serverUrl" placeholder="输入服务器地址，如 http://192.168.1.100:3000" value="wss://voicecall-signaling-production.up.railway.app/">
        </div>

        <!-- 加入房间表单 -->
        <div class="join-form" id="joinForm">
            <div class="form-group">
                <label>房间号</label>
                <input type="text" id="roomId" placeholder="输入房间号，如 1234" value="1234">
            </div>
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="userName" placeholder="输入昵称">
            </div>
            <button class="btn btn-primary" id="joinBtn">加入房间</button>
        </div>

        <!-- 通话控制 -->
        <div class="call-controls" id="callControls">
            <div class="users-list">
                <h3>👥 在线用户</h3>
                <div id="usersList"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="muteBtn">🔇 静音</button>
                <button class="btn btn-primary" id="callBtn">📞 发起通话</button>
            </div>

            <button class="btn btn-share" id="shareBtn" style="margin-top: 12px; width: 100%;">📷 共享摄像头</button>
            <button class="btn btn-danger" id="leaveBtn" style="margin-top: 8px;">离开房间</button>

            <!-- 视频显示区域 -->
            <div class="screen-share-area" id="screenShareArea">
                <h3>📺 视频共享</h3>
                <div class="video-grid" id="videoGrid">
                    <!-- 本地摄像头 -->
                    <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <span class="video-label">我的摄像头</span>
                    </div>
                </div>
                <button class="btn btn-fullscreen" id="fullscreenBtn" style="margin-top: 12px; width: 100%;">📺 全屏查看</button>
            </div>
        </div>

        <!-- 全屏覆盖层 -->
        <div class="fullscreen-overlay" id="fullscreenOverlay">
            <div class="fullscreen-label" id="fullscreenLabel">PC 屏幕</div>
            <div class="control-indicator" id="controlIndicator">🖱️ 控制模式</div>
            <video id="fullscreenVideo" autoplay playsinline></video>
            <div class="fullscreen-toolbar">
                <button id="exitFullscreenBtn">✕ 退出全屏</button>
                <button id="toggleControlBtn">🖱️ 启用控制</button>
            </div>
        </div>

        <p class="hint">💡 同一房间内的用户可以互相通话</p>
    </div>

    <script>
        // ========== 配置 ==========
        let serverUrl = '';
        let ws = null;
        let peerConnections = {};
        let localStream = null;
        let isMuted = false;
        
        // 摄像头/视频共享相关
        let screenStream = null;
        let isSharing = false;
        let screenPCs = {};
        
        // 全屏和远程控制相关
        let isFullscreen = false;
        let isControlMode = false;
        let controlTargetUser = null;
        let lastTouchTime = 0;
        
        // 中继模式相关
        let relayMode = {};
        let relayRetryCount = {};
        let relayAudioContext = null;
        let relayDestination = {};

        // DOM 元素
        const serverUrlInput = document.getElementById('serverUrl');
        const roomIdInput = document.getElementById('roomId');
        const userNameInput = document.getElementById('userName');
        const statusEl = document.getElementById('status');
        const connectionInfoEl = document.getElementById('connectionInfo');
        const joinForm = document.getElementById('joinForm');
        const callControls = document.getElementById('callControls');
        const usersList = document.getElementById('usersList');

        // 生成随机昵称
        userNameInput.value = '用户_' + Math.floor(Math.random() * 1000);

        // ========== 信令服务器连接 ==========
        function connect() {
            serverUrl = serverUrlInput.value.trim();
            if (!serverUrl) {
                alert('请输入信令服务器地址');
                return;
            }

            // 确保 WebSocket URL 格式正确
            let wsUrl = serverUrl;
            if (wsUrl.startsWith('https://')) {
                wsUrl = wsUrl.replace('https://', 'wss://');
            } else if (wsUrl.startsWith('http://')) {
                wsUrl = wsUrl.replace('http://', 'ws://');
            } else if (!wsUrl.startsWith('ws://') && !wsUrl.startsWith('wss://')) {
                wsUrl = 'ws://' + wsUrl;
            }
            if (wsUrl.endsWith('/')) {
                wsUrl = wsUrl.slice(0, -1);
            }

            statusEl.textContent = '正在连接...';
            statusEl.className = 'status-text';

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    statusEl.textContent = '已连接信令服务器';
                    statusEl.className = 'status-text connected';
                    connectionInfoEl.textContent = `✅ 连接成功: ${serverUrl}`;
                    joinForm.classList.remove('hidden');
                };

                ws.onclose = () => {
                    statusEl.textContent = '连接已断开';
                    statusEl.className = 'status-text error';
                    connectionInfoEl.textContent = '❌ 请检查服务器是否运行';
                    joinForm.classList.add('hidden');
                    callControls.classList.remove('active');
                };

                ws.onerror = (error) => {
                    statusEl.textContent = '连接失败';
                    statusEl.className = 'status-text error';
                    connectionInfoEl.textContent = '❌ 无法连接到服务器，请确保服务器已启动';
                    console.error('WebSocket 错误:', error);
                };

                ws.onmessage = handleMessage;

            } catch (error) {
                console.error('连接错误:', error);
                statusEl.textContent = '连接失败';
                statusEl.className = 'status-text error';
            }
        }

        // ========== 消息处理 ==========
        async function handleMessage(event) {
            const data = JSON.parse(event.data);

            switch (data.type) {
                case 'room-users':
                    updateUsersList(data.users);
                    break;

                case 'user-joined':
                    console.log(`${data.userId} 加入了房间`);
                    addUserToList(data.userId);
                    // 自动向新用户发起通话请求
                    if (localStream) {
                        createPeerConnection(data.userId, true);
                    }
                    break;

                case 'user-left':
                    console.log(`${data.userId} 离开了房间`);
                    removeUserFromList(data.userId);
                    closePeerConnection(data.userId);
                    break;

                case 'offer':
                    await handleOffer(data.from, data.payload);
                    break;

                case 'answer':
                    await handleAnswer(data.from, data.payload);
                    break;

                case 'ice-candidate':
                    await handleIceCandidate(data.from, data.payload);
                    break;
                    
                case 'relay-audio':
                    handleRelayAudio(data.from, data.audioData);
                    break;
                    
                case 'request-relay':
                    console.log(`对方请求中继模式: ${data.from}`);
                    switchToRelayMode(data.from);
                    break;
                    
                case 'relay-start':
                    console.log(`开始中继模式: ${data.from}`);
                    relayMode[data.from] = true;
                    switchToRelayMode(data.from);
                    break;

                case 'screen-offer':
                    await handleScreenOffer(data.from, data.payload);
                    break;

                case 'screen-answer':
                    await handleScreenAnswer(data.from, data.payload);
                    break;

                case 'screen-ice':
                    await handleScreenIce(data.from, data.payload);
                    break;

                case 'screen-stop':
                    removeRemoteScreen(data.from);
                    break;
            }
        }

        // ========== 加入房间 ==========
        async function joinRoom() {
            const roomId = roomIdInput.value.trim();
            const userName = userNameInput.value.trim();

            if (!roomId) {
                alert('请输入房间号');
                return;
            }
            if (!userName) {
                alert('请输入昵称');
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connect();
                setTimeout(() => joinRoom(), 1000);
                return;
            }

            // 获取本地音频流
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusEl.textContent = '已获取麦克风权限';
                statusEl.className = 'status-text connected';
            } catch (error) {
                console.error('获取麦克风失败:', error);
                alert('无法访问麦克风，请检查权限设置');
                return;
            }

            // 发送加入房间消息
            ws.send(JSON.stringify({
                type: 'join',
                roomId: roomId,
                userId: userName
            }));

            // 切换 UI
            joinForm.classList.add('hidden');
            callControls.classList.add('active');
            statusEl.textContent = `已加入房间 ${roomId}`;
        }

        // ========== 离开房间 ==========
        function leaveRoom() {
            // 停止摄像头共享
            stopScreenShare();

            // 关闭所有 PeerConnection
            Object.keys(peerConnections).forEach(userId => {
                closePeerConnection(userId);
            });

            // 停止本地流
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // 发送离开消息
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'leave' }));
            }

            // 切换 UI
            joinForm.classList.remove('hidden');
            callControls.classList.remove('active');
            usersList.innerHTML = '';
            statusEl.textContent = '已离开房间';
            statusEl.className = 'status-text';
        }

        // ========== P2P 连接管理 ==========
        // 自定义 TURN 服务器（Railway）
        const TURN_SERVER = 'beautiful-happiness-production-c963.up.railway.app';
        const TURN_USER = 'voiceuser';
        const TURN_CRED = 'voicepass2024';

        const config = {
            iceServers: [
                // Google STUN 服务器
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                // Twilio STUN 服务器
                { urls: 'stun:global.stun.twilio.com:3478' },
                // 额外 STUN 服务器
                { urls: 'stun:stun.stunprotocol.org:3478' },
                { urls: 'stun:stun.counterpath.com:3478' },
                { urls: 'stun:stun.qq.com:3478' },
                // 自定义 TURN 服务器（移动网络必需）
                { urls: 'turn:' + TURN_SERVER + ':3478', username: TURN_USER, credential: TURN_CRED },
                { urls: 'turn:' + TURN_SERVER + ':443', username: TURN_USER, credential: TURN_CRED }
            ],
            iceTransportPolicy: 'all',
            iceCandidatePoolSize: 16,
            // 优化连接参数
            bundled: true
        };

        function createPeerConnection(userId, isInitiator) {
            if (peerConnections[userId]) {
                return peerConnections[userId];
            }

            console.log(`创建 P2P 连接: ${isInitiator ? '发起方' : '接收方'}`);

            const pc = new RTCPeerConnection(config);
            peerConnections[userId] = pc;

            // 添加本地流
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }

            // 处理远程流
            pc.ontrack = (event) => {
                console.log(`收到 ${userId} 的音频流`);
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.autoplay = true;
                
                // 保存音频元素以便控制
                if (!pc.audioElement) {
                    pc.audioElement = audio;
                }
            };

            // ICE 候选
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal(userId, 'ice-candidate', event.candidate);
                }
            };

            // 连接状态变化
            pc.onconnectionstatechange = () => {
                console.log(`连接状态: ${userId} - ${pc.connectionState}`);
                
                // 根据连接状态更新UI
                const userEl = document.getElementById('user-' + userId);
                if (userEl) {
                    if (pc.connectionState === 'connected') {
                        userEl.classList.add('speaking');
                    } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                        userEl.classList.remove('speaking');
                        
                        // 自动重连（移动网络专用）
                        setTimeout(() => {
                            if (pc.connectionState !== 'connected') {
                                console.log(`尝试重新连接 ${userId}`);
                                closePeerConnection(userId);
                                createPeerConnection(userId, true);
                            }
                        }, 3000);
                    }
                }
            };
            
            // ICE 连接状态
            pc.oniceconnectionstatechange = () => {
                console.log(`ICE 状态: ${userId} - ${pc.iceConnectionState}`);
                
                if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {
                    relayRetryCount[userId] = (relayRetryCount[userId] || 0) + 1;
                    console.log(`P2P 连接失败次数: ${relayRetryCount[userId]}`);
                    
                    if (relayRetryCount[userId] >= 3) {
                        console.log(`切换到中继模式: ${userId}`);
                        switchToRelayMode(userId);
                    }
                }
            };

            // 发起通话
            if (isInitiator) {
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .then(() => sendSignal(userId, 'offer', pc.localDescription));
            }

            return pc;
        }

        function closePeerConnection(userId) {
            if (peerConnections[userId]) {
                peerConnections[userId].close();
                delete peerConnections[userId];
            }
        }

        async function handleOffer(from, payload) {
            console.log(`收到来自 ${from} 的通话请求`);
            const pc = createPeerConnection(from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(payload));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal(from, 'answer', pc.localDescription);
            statusEl.textContent = `正在与 ${from} 通话...`;
        }

        async function handleAnswer(from, payload) {
            console.log(`收到来自 ${from} 的应答`);
            const pc = peerConnections[from];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(payload));
            }
        }

        async function handleIceCandidate(from, payload) {
            const pc = peerConnections[from];
            if (pc) {
                await pc.addIceCandidate(new RTCIceCandidate(payload));
            }
        }

        function sendSignal(to, type, payload) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: type,
                    to: to,
                    payload: payload
                }));
            }
        }

        // ========== 中继模式 ==========
        function switchToRelayMode(userId) {
            console.log(`启用中继模式: ${userId}`);
            relayMode[userId] = true;
            
            closePeerConnection(userId);
            
            ws.send(JSON.stringify({ type: 'request-relay', to: userId }));
            
            if (!relayAudioContext) {
                relayAudioContext = new AudioContext();
            }
            
            if (!relayDestination[userId]) {
                relayDestination[userId] = relayAudioContext.createMediaStreamDestination();
            }
            
            if (localStream) {
                const source = relayAudioContext.createMediaStreamSource(localStream);
                source.connect(relayDestination[userId]);
            }
            
            const track = relayDestination[userId].stream.getAudioTracks()[0];
            if (track) {
                const processor = relayAudioContext.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    if (relayMode[userId] && ws && ws.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const buffer = inputData.buffer.slice(inputData.byteOffset, inputData.byteOffset + inputData.byteLength);
                        ws.send(JSON.stringify({
                            type: 'relay-audio',
                            to: userId,
                            audioData: Array.from(new Float32Array(buffer))
                        }));
                    }
                };
                processor.connect(relayAudioContext.destination);
            }
            
            statusEl.textContent = `已切换到中继模式`;
        }
        
        function handleRelayAudio(from, audioData) {
            if (!relayAudioContext) {
                relayAudioContext = new AudioContext();
            }
            
            const audioBuffer = relayAudioContext.createBuffer(1, audioData.length, 48000);
            audioBuffer.copyToChannel(new Float32Array(audioData), 0);
            
            const source = relayAudioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(relayAudioContext.destination);
            source.start();
        }

        // ========== 摄像头/视频共享 ==========
        let screenPCs = {};

        // 视频共享专用的 ICE 配置
        const screenConfig = {
            iceServers: [
                // Google 公共 STUN 服务器
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                // Twilio STUN 服务器
                { urls: 'stun:global.stun.twilio.com:3478' },
                // 额外 STUN 服务器
                { urls: 'stun:stun.stunprotocol.org:3478' },
                { urls: 'stun:stun.counterpath.com:3478' },
                { urls: 'stun:stun.qq.com:3478' },
                // 自定义 TURN 服务器（移动网络必需）
                { urls: 'turn:' + TURN_SERVER + ':3478', username: TURN_USER, credential: TURN_CRED },
                { urls: 'turn:' + TURN_SERVER + ':443', username: TURN_USER, credential: TURN_CRED }
            ],
            iceTransportPolicy: 'all',
            iceCandidatePoolSize: 16
        };

        async function startScreenShare() {
            try {
                console.log('[视频共享] 请求 getUserMedia (后置摄像头)...');
                // 手机端使用摄像头（优先后置）
                screenStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
            } catch (e) {
                // 后置摄像头失败，尝试任意摄像头
                try {
                    console.log('[视频共享] 后置摄像头失败，尝试前置...');
                    screenStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                } catch (e2) {
                    alert('无法获取摄像头权限');
                    return;
                }
            }

            console.log('[视频共享] getUserMedia 成功，轨道数:', screenStream.getTracks().length);

            isSharing = true;
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.textContent = '⏹️ 停止共享';
            shareBtn.classList.add('sharing');

            // 显示本地预览
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = screenStream;
            document.getElementById('localVideoWrapper').style.display = 'block';
            document.getElementById('screenShareArea').classList.add('active');

            // 对房间内每个用户发起视频连接
            const users = document.querySelectorAll('.user-item');
            console.log(`[视频共享] 房间内用户数: ${users.length}`);
            users.forEach(userEl => {
                const userId = userEl.querySelector('.user-name').textContent;
                createScreenPC(userId, true);
            });

            screenStream.getVideoTracks()[0].onended = () => stopScreenShare();
        }

        function stopScreenShare() {
            if (!isSharing) return;
            isSharing = false;

            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
            }

            Object.keys(screenPCs).forEach(uid => {
                if (screenPCs[uid]) { screenPCs[uid].close(); delete screenPCs[uid]; }
            });

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'screen-stop' }));
            }

            document.getElementById('localVideoWrapper').style.display = 'none';
            document.getElementById('localVideo').srcObject = null;

            const remoteVideos = document.querySelectorAll('.remote-video-wrapper');
            if (remoteVideos.length === 0) {
                document.getElementById('screenShareArea').classList.remove('active');
            }

            const shareBtn = document.getElementById('shareBtn');
            shareBtn.textContent = '📷 共享摄像头';
            shareBtn.classList.remove('sharing');
        }

        function createScreenPC(userId, isInitiator) {
            if (screenPCs[userId]) { screenPCs[userId].close(); delete screenPCs[userId]; }

            console.log(`[视频共享] 创建 screenPC: user=${userId}, initiator=${isInitiator}, hasStream=${!!screenStream}`);

            const pc = new RTCPeerConnection(screenConfig);
            screenPCs[userId] = pc;

            if (screenStream) {
                screenStream.getTracks().forEach(track => {
                    console.log(`[视频共享] 添加轨道: kind=${track.kind}, readyState=${track.readyState}`);
                    pc.addTrack(track, screenStream);
                });
                console.log(`[视频共享] 已添加 ${screenStream.getTracks().length} 个轨道`);
            }

            pc.ontrack = (event) => {
                console.log(`[视频共享] ontrack: ${userId}, streams=${event.streams.length}, track=${event.track.kind}`);
                showRemoteScreen(userId, event.streams[0]);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log(`[视频共享] ICE候选: ${event.candidate.type}`);
                    ws.send(JSON.stringify({ type: 'screen-ice', to: userId, payload: event.candidate }));
                }
            };

            pc.onconnectionstatechange = () => {
                console.log(`[视频共享] 连接状态 ${userId}: ${pc.connectionState}`);
            };

            pc.oniceconnectionstatechange = () => {
                console.log(`[视频共享] ICE状态 ${userId}: ${pc.iceConnectionState}`);
            };

            if (isInitiator) {
                pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: false })
                    .then(offer => {
                        console.log(`[视频共享] offer创建成功, sdp长度=${offer.sdp.length}`);
                        return pc.setLocalDescription(offer);
                    })
                    .then(() => {
                        const hasVideo = pc.localDescription.sdp.includes('m=video');
                        console.log(`[视频共享] 本地描述已设置, offer包含视频=${hasVideo}`);
                        ws.send(JSON.stringify({ type: 'screen-offer', to: userId, payload: pc.localDescription }));
                        console.log(`[视频共享] 已发送 screen-offer 给 ${userId}`);
                    })
                    .catch(e => console.log(`[视频共享] offer创建失败:`, e));
            }

            return pc;
        }

        async function handleScreenOffer(from, payload) {
            console.log(`[视频共享] 收到来自 ${from} 的 screen-offer`);
            document.getElementById('screenShareArea').classList.add('active');
            const pc = createScreenPC(from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(payload));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({ type: 'screen-answer', to: from, payload: pc.localDescription }));
            console.log(`[视频共享] 已发送 screen-answer 给 ${from}`);
        }

        async function handleScreenAnswer(from, payload) {
            console.log(`[视频共享] 收到来自 ${from} 的 screen-answer`);
            const pc = screenPCs[from];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(payload));
                console.log(`[视频共享] screen-answer 设置成功`);
            } else {
                console.log(`[视频共享] 未找到 screenPC for ${from}`);
            }
        }

        async function handleScreenIce(from, payload) {
            const pc = screenPCs[from];
            if (pc) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(payload));
                    console.log(`[视频共享] ICE 添加成功 from ${from}`);
                } catch(e) {
                    console.log(`[视频共享] ICE 添加失败:`, e);
                }
            }
        }

        function showRemoteScreen(userId, stream) {
            console.log(`[视频共享] showRemoteScreen: ${userId}, stream id: ${stream.id}`);
            const grid = document.getElementById('videoGrid');
            let wrapper = document.getElementById('remote-video-' + userId);
            if (!wrapper) {
                wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper remote-video-wrapper';
                wrapper.id = 'remote-video-' + userId;
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsinline = true;
                video.muted = false;
                video.style.width = '100%';
                video.style.height = 'auto';
                video.style.maxHeight = '400px';
                const label = document.createElement('span');
                label.className = 'video-label';
                label.textContent = userId + ' 的屏幕';
                wrapper.appendChild(video);
                wrapper.appendChild(label);
                grid.appendChild(wrapper);
            }
            const videoEl = wrapper.querySelector('video');
            videoEl.srcObject = stream;
            videoEl.play().catch(e => console.log(`[视频共享] play() 失败:`, e));
            document.getElementById('screenShareArea').classList.add('active');
            
            // 保存控制目标用户
            controlTargetUser = userId;
            console.log(`[视频共享] 控制目标已设置: ${controlTargetUser}`);
            
            // 立即设置全屏视频源
            const fullscreenVideo = document.getElementById('fullscreenVideo');
            fullscreenVideo.srcObject = stream;
            fullscreenVideo.play().catch(e => console.log(`[视频共享] 全屏play() 失败:`, e));
            console.log(`[视频共享] 全屏视频源已设置`);
            
            // 自动打开全屏模式！
            setTimeout(() => {
                openFullscreen();
                console.log(`[视频共享] 已自动打开全屏`);
            }, 500);
        }
        
        // ========== 全屏和远程控制 ==========
        function openFullscreen() {
            const overlay = document.getElementById('fullscreenOverlay');
            const fullscreenVideo = document.getElementById('fullscreenVideo');
            
            // 找到第一个远端视频
            const remoteWrappers = document.querySelectorAll('.remote-video-wrapper');
            if (remoteWrappers.length > 0) {
                const videoEl = remoteWrappers[0].querySelector('video');
                if (videoEl.srcObject) {
                    fullscreenVideo.srcObject = videoEl.srcObject;
                    fullscreenVideo.play().catch(e => console.log(`[全屏] play() 失败:`, e));
                }
            }
            
            overlay.classList.add('active');
            isFullscreen = true;
            
            // 添加触摸事件
            setupTouchControls(fullscreenVideo);
        }
        
        function closeFullscreen() {
            const overlay = document.getElementById('fullscreenOverlay');
            overlay.classList.remove('active');
            isFullscreen = false;
            
            // 禁用控制模式
            if (isControlMode) {
                toggleControlMode();
            }
        }
        
        function setupTouchControls(videoEl) {
            const overlay = document.getElementById('fullscreenOverlay');
            const videoRect = videoEl.getBoundingClientRect();
            
            // 触摸开始
            overlay.addEventListener('touchstart', handleTouchStart, { passive: false });
            
            // 触摸移动
            overlay.addEventListener('touchmove', handleTouchMove, { passive: false });
            
            // 触摸结束
            overlay.addEventListener('touchend', handleTouchEnd, { passive: false });
            
            // 点击事件（用于模拟鼠标点击）
            overlay.addEventListener('click', handleClick);
        }
        
        let touchStartPos = null;
        let isDragging = false;
        
        function handleTouchStart(e) {
            if (!isControlMode) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const overlay = document.getElementById('fullscreenOverlay');
            const video = document.getElementById('fullscreenVideo');
            const rect = video.getBoundingClientRect();
            
            // 计算相对于视频的位置（0-1范围）
            const relX = (touch.clientX - rect.left) / rect.width;
            const relY = (touch.clientY - rect.top) / rect.height;
            
            touchStartPos = { x: touch.clientX, y: touch.clientY, relX, relY };
            isDragging = true;
            
            // 发送鼠标移动
            sendControl('mousemoveabs', { x: relX, y: relY });
            
            // 发送鼠标按下
            sendControl('mousedown', { button: 0 });
        }
        
        function handleTouchMove(e) {
            if (!isControlMode || !isDragging) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const overlay = document.getElementById('fullscreenOverlay');
            const video = document.getElementById('fullscreenVideo');
            const rect = video.getBoundingClientRect();
            
            // 计算相对于视频的位置（0-1范围）
            const relX = (touch.clientX - rect.left) / rect.width;
            const relY = (touch.clientY - rect.top) / rect.height;
            
            // 发送鼠标移动
            sendControl('mousemoveabs', { x: relX, y: relY });
            
            touchStartPos = { x: touch.clientX, y: touch.clientY, relX, relY };
        }
        
        function handleTouchEnd(e) {
            if (!isControlMode) return;
            e.preventDefault();
            
            // 发送鼠标释放
            sendControl('mouseup', { button: 0 });
            
            // 检测是否为点击（移动距离小于10px）
            if (touchStartPos) {
                const touch = e.changedTouches[0];
                const dx = Math.abs(touch.clientX - touchStartPos.x);
                const dy = Math.abs(touch.clientY - touchStartPos.y);
                
                if (dx < 10 && dy < 10) {
                    // 发送点击
                    sendControl('click', { button: 0 });
                }
            }
            
            isDragging = false;
            touchStartPos = null;
        }
        
        function handleClick(e) {
            if (!isControlMode) return;
            
            const overlay = document.getElementById('fullscreenOverlay');
            const video = document.getElementById('fullscreenVideo');
            const rect = video.getBoundingClientRect();
            
            // 计算相对于视频的位置（0-1范围）
            const relX = (e.clientX - rect.left) / rect.width;
            const relY = (e.clientY - rect.top) / rect.height;
            
            // 移动鼠标到点击位置
            sendControl('mousemoveabs', { x: relX, y: relY });
            
            // 发送点击
            sendControl('click', { button: 0 });
        }
        
        function toggleControlMode() {
            isControlMode = !isControlMode;
            
            const indicator = document.getElementById('controlIndicator');
            const toggleBtn = document.getElementById('toggleControlBtn');
            
            if (isControlMode) {
                indicator.classList.add('active');
                toggleBtn.textContent = '⏹️ 停止控制';
                toggleBtn.classList.add('active');
                
                // 连接控制服务器
                connectControl();
            } else {
                indicator.classList.remove('active');
                toggleBtn.textContent = '🖱️ 启用控制';
                toggleBtn.classList.remove('active');
                
                // 断开控制连接
                if (controlWs) {
                    controlWs.close();
                    controlWs = null;
                }
            }
        }
        
        function connectControl() {
            // 控制模式只需要通过主WebSocket发送，不需要单独连接
            console.log('[控制] 控制模式已启用');
        }
        
        function sendControl(action, data = {}) {
            if (!controlTargetUser) {
                console.log('[控制] 未指定控制目标');
                return;
            }
            
            const controlData = {
                type: 'control',
                action: action,
                to: controlTargetUser,
                ...data
            };
            
            // 通过主WebSocket发送控制消息
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(controlData));
                console.log(`[控制] 发送: ${action}`);
            } else {
                console.log('[控制] WebSocket未连接，无法发送控制命令');
            }
        }
        
        // 监听全屏按钮点击
        document.getElementById('fullscreenBtn').addEventListener('click', openFullscreen);
        document.getElementById('exitFullscreenBtn').addEventListener('click', closeFullscreen);
        document.getElementById('toggleControlBtn').addEventListener('click', toggleControlMode);
        
        // ESC键退出全屏
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isFullscreen) {
                closeFullscreen();
            }
        });

        function removeRemoteScreen(userId) {
            const wrapper = document.getElementById('remote-video-' + userId);
            if (wrapper) wrapper.remove();
            if (screenPCs[userId]) { screenPCs[userId].close(); delete screenPCs[userId]; }
            if (!isSharing && document.querySelectorAll('.remote-video-wrapper').length === 0) {
                document.getElementById('screenShareArea').classList.remove('active');
            }
        }

        // ========== UI 更新 ==========
        function updateUsersList(users) {
            usersList.innerHTML = '';
            users.forEach(userId => addUserToList(userId));
        }

        function addUserToList(userId) {
            if (document.getElementById('user-' + userId)) return;

            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = 'user-' + userId;
            div.innerHTML = `
                <div class="user-avatar">👤</div>
                <div class="user-name">${userId}</div>
                <div class="mic-indicator" id="indicator-${userId}"></div>
            `;
            usersList.appendChild(div);
        }

        function removeUserFromList(userId) {
            const el = document.getElementById('user-' + userId);
            if (el) el.remove();
        }

        // ========== 通话控制 ==========
        document.getElementById('joinBtn').addEventListener('click', joinRoom);
        document.getElementById('leaveBtn').addEventListener('click', leaveRoom);

        document.getElementById('shareBtn').addEventListener('click', () => {
            if (isSharing) {
                stopScreenShare();
            } else {
                startScreenShare();
            }
        });

        document.getElementById('muteBtn').addEventListener('click', () => {
            if (!localStream) return;

            if (isMuted) {
                localStream.getAudioTracks().forEach(track => track.enabled = true);
                document.getElementById('muteBtn').textContent = '🔇 静音';
                document.getElementById('muteBtn').classList.remove('btn-danger');
                document.getElementById('muteBtn').classList.add('btn-secondary');
            } else {
                localStream.getAudioTracks().forEach(track => track.enabled = false);
                document.getElementById('muteBtn').textContent = '🔊 取消静音';
                document.getElementById('muteBtn').classList.remove('btn-secondary');
                document.getElementById('muteBtn').classList.add('btn-danger');
            }
            isMuted = !isMuted;
        });

        document.getElementById('callBtn').addEventListener('click', async () => {
            // 向所有在线用户发起通话
            const users = usersList.querySelectorAll('.user-item');
            if (users.length === 0) {
                alert('房间里没有其他用户');
                return;
            }

            users.forEach(userEl => {
                const userId = userEl.querySelector('.user-name').textContent;
                if (!peerConnections[userId]) {
                    createPeerConnection(userId, true);
                }
            });

            statusEl.textContent = '正在呼叫...';
        });

        // 自动连接
        connect();

        // 页面卸载时离开
        window.addEventListener('beforeunload', leaveRoom);
    </script>
