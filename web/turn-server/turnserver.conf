# Coturn TURN Server Configuration

# 监听端口
listening-port=3478
tls-listening-port=5349

# 外部IP地址（Railway会自动设置）
# external-ip=REPLACE_WITH_YOUR_EXTERNAL_IP

# Realm 配置
realm=voicecall-turn

# 用户认证
user=guest:guest123
user=voiceuser:voicepass2024

# 长期凭证机制
lt-cred-mechanism

# 启用 TURN
TURNS

# 启用 STUN
STUN

# 日志
Verbose
syslog
log-file=/var/log/turnserver.log

# 证书（用于 TLS）
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/pkey.pem

# 最小端口范围
min-port=49160
max-port=49200

# 启用 TCP
tcp
# 启用 UDP
udp

# 稳定连接
stability-check

# 拒绝旧版本
no-loopback-peers
no-multicast-peers

# 认证超时
user-quota=100
total-quota=1000
