<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎙️ 语音通话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .server-input {
            margin-bottom: 20px;
        }

        .server-input label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .server-input input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .server-input input:focus {
            outline: none;
            border-color: #4ade80;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4ade80;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-text {
            font-size: 16px;
            color: #aaa;
        }

        .status-text.connected {
            color: #4ade80;
        }

        .status-text.error {
            color: #f87171;
        }

        .users-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .users-list h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .user-item.speaking {
            background: rgba(74, 222, 128, 0.2);
            border-left: 3px solid #4ade80;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 18px;
        }

        .user-name {
            flex: 1;
            font-size: 15px;
        }

        .user-status {
            font-size: 12px;
            color: #888;
        }

        .call-controls {
            display: none;
        }

        .call-controls.active {
            display: block;
        }

        .mic-indicator {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .mic-indicator.muted {
            background: #f87171;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .join-form {
            display: block;
        }

        .join-form.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .hint {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }

        .connection-info {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #4ade80;
        }

        .volume-meter {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .volume-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            width: 0%;
            transition: width 0.1s;
        }

        /* 屏幕共享区域 */
        .screen-share-area {
            display: none;
            margin-top: 16px;
        }

        .screen-share-area.active {
            display: block;
        }

        .screen-share-area h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .video-wrapper video {
            width: 100%;
            max-height: 220px;
            display: block;
            object-fit: contain;
            background: #111;
        }

        .video-label {
            position: absolute;
            bottom: 6px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .btn-share {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
        }

        .btn-share:hover {
            opacity: 0.85;
        }

        .btn-share.sharing {
            background: linear-gradient(135deg, #f97316, #ea580c);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 语音通话</h1>
        <p class="subtitle">P2P通话</p>

        <!-- 连接状态 -->
        <div class="status-bar">
            <div class="status-text" id="status">准备连接信令服务器</div>
            <div class="connection-info" id="connectionInfo">
                请先输入信令服务器地址
            </div>
        </div>

        <!-- 服务器地址 -->
        <div class="server-input">
            <label>📡 信令服务器地址</label>
            <input type="text" id="serverUrl" placeholder="输入服务器地址，如 http://192.168.1.100:3000" value="https://voicecall-signaling-production.up.railway.app/">
        </div>

        <!-- 加入房间表单 -->
        <div class="join-form" id="joinForm">
            <div class="form-group">
                <label>房间号</label>
                <input type="text" id="roomId" placeholder="输入房间号，如 1234" value="1234">
            </div>
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="userName" placeholder="输入昵称">
            </div>
            <button class="btn btn-primary" id="joinBtn">加入房间</button>
        </div>

        <!-- 通话控制 -->
        <div class="call-controls" id="callControls">
            <div class="users-list">
                <h3>👥 在线用户</h3>
                <div id="usersList"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="muteBtn">🔇 静音</button>
                <button class="btn btn-primary" id="callBtn">📞 发起通话</button>
            </div>

            <button class="btn btn-share" id="shareBtn" style="margin-top: 12px; width: 100%;">🖥️ 共享屏幕</button>
            <button class="btn btn-secondary" id="controlBtn" style="margin-top: 12px; width: 100%; display: none;">🖱️ 允许远程控制</button>
            <button class="btn btn-danger" id="leaveBtn" style="margin-top: 8px;">离开房间</button>

            <!-- 屏幕共享视频区域 -->
            <div class="screen-share-area" id="screenShareArea">
                <h3>📺 屏幕共享</h3>
                <div class="video-grid" id="videoGrid">
                    <!-- 本地屏幕 -->
                    <div class="video-wrapper" id="localVideoWrapper" style="display:none;">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <span class="video-label">我的屏幕</span>
                    </div>
                </div>
            </div>
        </div>

        <p class="hint">💡 同一房间内的用户可以互相通话</p>
    </div>

    <script>
        // ========== 配置 ==========
        let serverUrl = '';
        let ws = null;
        let heartbeatTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;
        let currentRoomId = '';
        let currentUserId = '';
        let peerConnections = {};
        let localStream = null;
        let isMuted = false;
        
        // 屏幕共享相关
        let screenStream = null;
        let isSharing = false;
        let screenTracks = {}; // { userId: videoElement }
        
        // 中继模式相关
        let relayMode = {};  // { userId: true/false }
        let relayRetryCount = {};  // { userId: count }
        let relayAudioContext = null;
        let relayDestination = {};  // { userId: MediaStreamDestination }

        // DOM 元素
        const serverUrlInput = document.getElementById('serverUrl');
        const roomIdInput = document.getElementById('roomId');
        const userNameInput = document.getElementById('userName');
        const statusEl = document.getElementById('status');
        const connectionInfoEl = document.getElementById('connectionInfo');
        const joinForm = document.getElementById('joinForm');
        const callControls = document.getElementById('callControls');
        const usersList = document.getElementById('usersList');

        // 生成随机昵称
        userNameInput.value = '用户_' + Math.floor(Math.random() * 1000);

        // ========== 信令服务器连接 ==========
        function connect() {
            serverUrl = serverUrlInput.value.trim();
            if (!serverUrl) {
                alert('请输入信令服务器地址');
                return;
            }

            // 确保 WebSocket URL 格式正确
            let wsUrl = serverUrl;
            if (wsUrl.startsWith('https://')) {
                wsUrl = wsUrl.replace('https://', 'wss://');
            } else if (wsUrl.startsWith('http://')) {
                wsUrl = wsUrl.replace('http://', 'ws://');
            } else if (!wsUrl.startsWith('ws://') && !wsUrl.startsWith('wss://')) {
                wsUrl = 'ws://' + wsUrl;
            }
            if (wsUrl.endsWith('/')) {
                wsUrl = wsUrl.slice(0, -1);
            }

            statusEl.textContent = '正在连接...';
            statusEl.className = 'status-text';

            try {
                ws = new WebSocket(wsUrl);
                let heartbeatTimer = null;

                ws.onopen = () => {
                    statusEl.textContent = '已连接信令服务器';
                    statusEl.className = 'status-text connected';
                    connectionInfoEl.textContent = `✅ 连接成功: ${serverUrl}`;
                    joinForm.classList.remove('hidden');
                    
                    // 启动心跳 - 每25秒发送一次
                    heartbeatTimer = setInterval(() => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'ping' }));
                        }
                    }, 25000);
                };

                ws.onclose = () => {
                    // 清除心跳定时器
                    if (heartbeatTimer) {
                        clearInterval(heartbeatTimer);
                    }
                    
                    // 页面卸载时不重连
                    if (document.hidden) {
                        console.log('[WebSocket] 页面隐藏，停止重连');
                        return;
                    }
                    
                    console.log('[WebSocket] 连接断开');

                    statusEl.textContent = '连接中断，正在重连...';
                    statusEl.className = 'status-text error';
                    connectionInfoEl.textContent = '🔄 正在重连...';
                    
                    // 指数退避重连
                    reconnectAttempts++;
                    const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts - 1), 10000);
                    console.log(`重连尝试 ${reconnectAttempts}，${delay/1000}秒后重试`);
                    
                    if (reconnectAttempts <= MAX_RECONNECT_ATTEMPTS) {
                        setTimeout(() => connect(), delay);
                    } else {
                        statusEl.textContent = '连接失败';
                        connectionInfoEl.textContent = '❌ 无法连接服务器';
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                };

                ws.onmessage = handleMessage;

            } catch (error) {
                console.error('连接错误:', error);
                statusEl.textContent = '连接失败';
                statusEl.className = 'status-text error';
            }
        }

        // ========== 消息处理 ==========
        async function handleMessage(event) {
            const data = JSON.parse(event.data);

            switch (data.type) {
                case 'room-users':
                    updateUsersList(data.users);
                    break;

                case 'user-joined':
                    console.log(`${data.userId} 加入了房间`);
                    addUserToList(data.userId);
                    // 自动向新用户发起通话请求
                    if (localStream) {
                        createPeerConnection(data.userId, true);
                    }
                    break;

                case 'user-left':
                    console.log(`${data.userId} 离开了房间`);
                    removeUserFromList(data.userId);
                    closePeerConnection(data.userId);
                    break;

                case 'offer':
                    await handleOffer(data.from, data.payload);
                    break;

                case 'answer':
                    await handleAnswer(data.from, data.payload);
                    break;

                case 'ice-candidate':
                    await handleIceCandidate(data.from, data.payload);
                    break;
                    
                case 'relay-audio':
                    handleRelayAudio(data.from, data.audioData);
                    break;
                    
                case 'request-relay':
                    console.log(`对方请求中继模式: ${data.from}`);
                    switchToRelayMode(data.from);
                    break;
                    
                case 'relay-start':
                    console.log(`开始中继模式: ${data.from}`);
                    relayMode[data.from] = true;
                    switchToRelayMode(data.from);
                    break;

                case 'screen-offer':
                    await handleScreenOffer(data.from, data.payload);
                    break;

                case 'screen-answer':
                    await handleScreenAnswer(data.from, data.payload);
                    break;

                case 'screen-ice':
                    await handleScreenIce(data.from, data.payload);
                    break;

                case 'screen-stop':
                    removeRemoteScreen(data.from);
                    break;

                // 远程控制
                case 'control':
                    handleControl(data.action, data);
                    break;
            }
        }

        // ========== 加入房间 ==========
        async function joinRoom() {
            const roomId = roomIdInput.value.trim();
            const userName = userNameInput.value.trim();

            if (!roomId) {
                alert('请输入房间号');
                return;
            }
            if (!userName) {
                alert('请输入昵称');
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connect();
                setTimeout(() => joinRoom(), 1000);
                return;
            }

            // 获取本地音频流
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusEl.textContent = '已获取麦克风权限';
                statusEl.className = 'status-text connected';
            } catch (error) {
                console.error('获取麦克风失败:', error);
                alert('无法访问麦克风，请检查权限设置');
                return;
            }

            // 发送加入房间消息
            ws.send(JSON.stringify({
                type: 'join',
                roomId: roomId,
                userId: userName
            }));

            // 切换 UI
            joinForm.classList.add('hidden');
            callControls.classList.add('active');
            statusEl.textContent = `已加入房间 ${roomId}`;
        }

        // ========== 清理函数 ==========
        function cleanupVoiceCall() {
            // 停止本地语音流
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            isMuted = false;
            const muteBtn = document.getElementById('muteBtn');
            if (muteBtn) {
                muteBtn.textContent = '🔇 静音';
                muteBtn.classList.remove('btn-danger');
                muteBtn.classList.add('btn-secondary');
            }
        }

        function cleanupScreenShare() {
            isSharing = false;
            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
            }
            const localVideo = document.getElementById('localVideo');
            if (localVideo) localVideo.srcObject = null;
            document.getElementById('localVideoWrapper').style.display = 'none';
            document.getElementById('screenShareArea').classList.remove('active');
            // 清理远端视频
            document.querySelectorAll('.remote-video-wrapper').forEach(el => el.remove());
            const shareBtn = document.getElementById('shareBtn');
            if (shareBtn) {
                shareBtn.textContent = '🖥️ 共享屏幕';
                shareBtn.classList.remove('sharing');
            }
        }

        // ========== 离开房间 ==========
        function leaveRoom() {
            // 停止屏幕共享
            stopScreenShare();

            // 关闭所有 PeerConnection
            Object.keys(peerConnections).forEach(userId => {
                closePeerConnection(userId);
            });

            // 停止本地流
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // 发送离开消息
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'leave' }));
            }

            // 切换 UI
            joinForm.classList.remove('hidden');
            callControls.classList.remove('active');
            usersList.innerHTML = '';
            statusEl.textContent = '已离开房间';
            statusEl.className = 'status-text';
        }

        // ========== P2P 连接管理 ==========
        const TURN_SERVER = 'openrelay.metered.ca';
        const TURN_USER = 'openrelay';
        const TURN_CRED = 'openrelay';

        // 优化的 ICE 配置 - 更稳定
        const config = {
            iceServers: [
                // Google STUN 服务器
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                // Twilio STUN 服务器
                { urls: 'stun:global.stun.twilio.com:3478' },
                // Metered.ca TURN 服务器（主）
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelay', credential: 'openrelay' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelay', credential: 'openrelay' },
                { urls: 'turns:openrelay.metered.ca:443', username: 'openrelay', credential: 'openrelay' },
                // Twilio TURN 服务器（备用）
                { urls: 'turn:global.turn.twilio.com:3478?transport=udp', username: '', credential: '' },
                { urls: 'turn:global.turn.twilio.com:3478?transport=tcp', username: '', credential: '' }
            ],
            iceTransportPolicy: 'all',
            iceCandidatePoolSize: 20,
            sdpSemantics: 'unified-plan',
            // 更保守的 ICE 设置，减少断开
            iceConnectionReceivingTimeout: 25000,
            iceBackupCandidatePairPollInterval: 10000
        };
            sdpSemantics: 'unified-plan'
        };

        function createPeerConnection(userId, isInitiator) {
            if (peerConnections[userId]) {
                return peerConnections[userId];
            }

            console.log(`创建 P2P 连接: ${isInitiator ? '发起方' : '接收方'}`);

            const pc = new RTCPeerConnection(config);
            peerConnections[userId] = pc;

            // 添加本地流
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }

            // 处理远程流
            pc.ontrack = (event) => {
                console.log(`收到 ${userId} 的音频流`);
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.autoplay = true;
                
                // 保存音频元素以便控制
                if (!pc.audioElement) {
                    pc.audioElement = audio;
                }
            };

            // ICE 候选
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal(userId, 'ice-candidate', event.candidate);
                }
            };

            // 连接状态变化
            pc.onconnectionstatechange = () => {
                console.log(`连接状态: ${userId} - ${pc.connectionState}`);
                
                // 根据连接状态更新UI
                const userEl = document.getElementById('user-' + userId);
                if (userEl) {
                    if (pc.connectionState === 'connected') {
                        userEl.classList.add('speaking');
                        userEl.querySelector('.user-status').textContent = '已连接';
                        relayRetryCount[userId] = 0; // 重置失败计数
                    } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                        userEl.classList.remove('speaking');
                        userEl.querySelector('.user-status').textContent = '重连中...';
                        
                        // 自动重连
                        setTimeout(() => {
                            if (pc.connectionState !== 'connected') {
                                console.log(`尝试重新连接 ${userId}`);
                                closePeerConnection(userId);
                                createPeerConnection(userId, true);
                            }
                        }, 2000);
                    }
                }
            };
            
            // ICE 连接状态
            pc.oniceconnectionstatechange = () => {
                console.log(`ICE 状态: ${userId} - ${pc.iceConnectionState}`);
                
                // ICE 连接失败 - 使用指数退避重连
                if (pc.iceConnectionState === 'failed') {
                    relayRetryCount[userId] = (relayRetryCount[userId] || 0) + 1;
                    console.log(`ICE 失败次数: ${relayRetryCount[userId]}`);
                    
                    const delay = Math.min(1000 * Math.pow(2, relayRetryCount[userId] - 1), 10000);
                    setTimeout(() => {
                        if (pc.iceConnectionState !== 'connected' && !document.hidden) {
                            console.log(`${delay/1000}秒后重连 ${userId}`);
                            closePeerConnection(userId);
                            createPeerConnection(userId, true);
                        }
                    }, delay);
                }
            };

            // 发起通话
            if (isInitiator) {
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .then(() => sendSignal(userId, 'offer', pc.localDescription));
            }

            return pc;
        }

        function closePeerConnection(userId) {
            if (peerConnections[userId]) {
                peerConnections[userId].close();
                delete peerConnections[userId];
            }
        }

        async function handleOffer(from, payload) {
            console.log(`收到来自 ${from} 的通话请求`);
            const pc = createPeerConnection(from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(payload));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal(from, 'answer', pc.localDescription);
            statusEl.textContent = `正在与 ${from} 通话...`;
        }

        async function handleAnswer(from, payload) {
            console.log(`收到来自 ${from} 的应答`);
            const pc = peerConnections[from];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(payload));
            }
        }

        async function handleIceCandidate(from, payload) {
            const pc = peerConnections[from];
            if (pc) {
                await pc.addIceCandidate(new RTCIceCandidate(payload));
            }
        }

        function sendSignal(to, type, payload) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: type,
                    to: to,
                    payload: payload
                }));
            }
        }

        // ========== 中继模式 ==========
        function switchToRelayMode(userId) {
            console.log(`启用中继模式: ${userId}`);
            relayMode[userId] = true;
            
            // 关闭 P2P 连接
            closePeerConnection(userId);
            
            // 通知对方开启中继
            ws.send(JSON.stringify({ type: 'request-relay', to: userId }));
            
            // 初始化音频上下文
            if (!relayAudioContext) {
                relayAudioContext = new AudioContext();
            }
            
            // 为该用户创建音频目的地
            if (!relayDestination[userId]) {
                relayDestination[userId] = relayAudioContext.createMediaStreamDestination();
            }
            
            // 将本地音频连接到中继
            if (localStream) {
                const source = relayAudioContext.createMediaStreamSource(localStream);
                source.connect(relayDestination[userId]);
            }
            
            // 监听中继音频数据并发送
            const track = relayDestination[userId].stream.getAudioTracks()[0];
            if (track) {
                const processor = relayAudioContext.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    if (relayMode[userId] && ws && ws.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        // 转换为 ArrayBuffer 并发送
                        const buffer = inputData.buffer.slice(inputData.byteOffset, inputData.byteOffset + inputData.byteLength);
                        ws.send(JSON.stringify({
                            type: 'relay-audio',
                            to: userId,
                            audioData: Array.from(new Float32Array(buffer))
                        }));
                    }
                };
                processor.connect(relayAudioContext.destination);
            }
            
            // 更新 UI
            const userEl = document.getElementById('user-' + userId);
            if (userEl) {
                const statusEl = userEl.querySelector('.user-status');
                if (statusEl) statusEl.textContent = '中继模式';
            }
            
            statusEl.textContent = `已切换到中继模式`;
        }
        
        function handleRelayAudio(from, audioData) {
            // 播放接收到的音频
            if (!relayAudioContext) {
                relayAudioContext = new AudioContext();
            }
            
            const audioBuffer = relayAudioContext.createBuffer(1, audioData.length, 48000);
            audioBuffer.copyToChannel(new Float32Array(audioData), 0);
            
            const source = relayAudioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(relayAudioContext.destination);
            source.start();
        }

        // ========== 屏幕共享 ==========
        let screenPCs = {}; // 专门用于屏幕共享的 PeerConnection
        
        // 远程控制相关
        let controlEnabled = false;

        // 屏幕共享专用的 ICE 配置（视频需要更多带宽）
        const screenConfig = {
            iceServers: [
                // Google 公共 STUN 服务器
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                // Twilio STUN 服务器
                { urls: 'stun:global.stun.twilio.com:3478' },
                // 额外 STUN 服务器
                { urls: 'stun:stun.stunprotocol.org:3478' },
                { urls: 'stun:stun.counterpath.com:3478' },
                { urls: 'stun:stun.qq.com:3478' },
                // Metered.ca 免费 TURN 服务器（移动网络必需）
                { urls: 'turn:' + TURN_SERVER + ':80', username: TURN_USER, credential: TURN_CRED },
                { urls: 'turn:' + TURN_SERVER + ':443', username: TURN_USER, credential: TURN_CRED },
                { urls: 'turns:' + TURN_SERVER + ':443', username: TURN_USER, credential: TURN_CRED }
            ],
            iceTransportPolicy: 'all',
            iceCandidatePoolSize: 16,
            // 增强稳定性配置
            sdpSemantics: 'unified-plan'
        };

        async function startScreenShare() {
            try {
                console.log('[屏幕共享] 请求 getDisplayMedia...');
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: 15, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                console.log('[屏幕共享] getDisplayMedia 成功，轨道数:', screenStream.getTracks().length);
            } catch (e) {
                console.log('[屏幕共享] getDisplayMedia 失败:', e.message);
                console.log('[屏幕共享] 错误详情:', e);
                alert('无法获取屏幕：' + e.message);
                return;
            }

            isSharing = true;
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.textContent = '⏹️ 停止共享';
            shareBtn.classList.add('sharing');

            // 显示本地预览
            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = screenStream;
            document.getElementById('localVideoWrapper').style.display = 'block';
            document.getElementById('screenShareArea').classList.add('active');
            
            // 显示远程控制按钮
            document.getElementById('controlBtn').style.display = 'block';

            // 对房间内每个用户发起屏幕共享连接
            const users = document.querySelectorAll('.user-item');
            console.log(`[屏幕共享] 房间内用户数: ${users.length}`);
            if (users.length === 0) {
                console.log(`[屏幕共享] 警告：房间内没有其他用户！`);
            }
            users.forEach(userEl => {
                const userId = userEl.querySelector('.user-name').textContent;
                console.log(`[屏幕共享] 为用户 ${userId} 创建 screenPC`);
                createScreenPC(userId, true);
            });

            // 监听停止事件（用户在系统层面停止共享）
            screenStream.getVideoTracks()[0].onended = () => {
                stopScreenShare();
            };
        }

        function stopScreenShare() {
            if (!isSharing) return;
            isSharing = false;

            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
            }

            // 关闭所有屏幕共享 PC
            Object.keys(screenPCs).forEach(uid => {
                if (screenPCs[uid]) {
                    screenPCs[uid].close();
                    delete screenPCs[uid];
                }
            });

            // 通知对端停止
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'screen-stop' }));
            }

            // 隐藏本地预览
            document.getElementById('localVideoWrapper').style.display = 'none';
            document.getElementById('localVideo').srcObject = null;
            
            // 隐藏远程控制按钮
            document.getElementById('controlBtn').style.display = 'none';
            disableControl();

            // 如果没有远端屏幕，收起区域
            const remoteVideos = document.querySelectorAll('.remote-video-wrapper');
            if (remoteVideos.length === 0) {
                document.getElementById('screenShareArea').classList.remove('active');
            }

            const shareBtn = document.getElementById('shareBtn');
            shareBtn.textContent = '🖥️ 共享屏幕';
            shareBtn.classList.remove('sharing');
        }

        function createScreenPC(userId, isInitiator) {
            if (screenPCs[userId]) {
                screenPCs[userId].close();
                delete screenPCs[userId];
            }

            console.log(`[屏幕共享] 创建 screenPC: user=${userId}, initiator=${isInitiator}, hasStream=${!!screenStream}`);

            const pc = new RTCPeerConnection(screenConfig);
            screenPCs[userId] = pc;

            // 添加屏幕视频轨道
            if (screenStream) {
                screenStream.getTracks().forEach(track => {
                    console.log(`[屏幕共享] 添加轨道: kind=${track.kind}, readyState=${track.readyState}`);
                    pc.addTrack(track, screenStream);
                });
                console.log(`[屏幕共享] 已添加 ${screenStream.getTracks().length} 个轨道`);
            } else {
                console.log(`[屏幕共享] 无本地屏幕流（接收方模式）`);
            }

            // 收到对方的屏幕流
            pc.ontrack = (event) => {
                console.log(`[屏幕共享] ontrack 触发: ${userId}, streams=${event.streams.length}, track=${event.track.kind}`);
                showRemoteScreen(userId, event.streams[0]);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log(`[屏幕共享] ICE候选: ${event.candidate.type} ${event.candidate.protocol} ${event.candidate.address || event.candidate.candidate}`);
                    ws.send(JSON.stringify({ type: 'screen-ice', to: userId, payload: event.candidate }));
                } else {
                    console.log(`[屏幕共享] ICE候选收集完成`);
                }
            };

            // 连接状态
            pc.onconnectionstatechange = () => {
                console.log(`[屏幕共享] 连接状态 ${userId}: ${pc.connectionState}`);
                if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    // 自动重连
                    setTimeout(() => {
                        if (screenPCs[userId] && (screenPCs[userId].connectionState === 'failed' || screenPCs[userId].connectionState === 'disconnected')) {
                            console.log(`[屏幕共享] 连接断开，尝试重连 ${userId}`);
                            createScreenPC(userId, true);
                        }
                    }, 3000);
                }
            };

            pc.oniceconnectionstatechange = () => {
                console.log(`[屏幕共享] ICE状态 ${userId}: ${pc.iceConnectionState}`);
                
                // 检测连接超时并重启 ICE
                if (pc.iceConnectionState === 'checking') {
                    setTimeout(() => {
                        if (screenPCs[userId] && screenPCs[userId].iceConnectionState === 'checking') {
                            console.log(`[屏幕共享] ICE 连接超时，重启 ICE`);
                            screenPCs[userId].restartIce();
                        }
                    }, 10000);
                }
            };

            if (isInitiator) {
                console.log(`[屏幕共享] 创建 offer...`);
                pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: false })
                    .then(offer => {
                        console.log(`[屏幕共享] offer创建成功`);
                        console.log(`[屏幕共享] offer.sdp 长度: ${offer.sdp.length}`);
                        console.log(`[屏幕共享] offer.sdp 内容预览:\n${offer.sdp.substring(0, 500)}`);
                        return pc.setLocalDescription(offer);
                    })
                    .then(() => {
                        const sdp = pc.localDescription.sdp;
                        const hasVideo = sdp.includes('m=video');
                        const videoLine = sdp.split('\r\n').find(l => l.startsWith('m=video'));
                        console.log(`[屏幕共享] 本地描述已设置, offer包含视频=${hasVideo}`);
                        if (videoLine) console.log(`[屏幕共享] 视频媒体行: ${videoLine}`);
                        ws.send(JSON.stringify({ type: 'screen-offer', to: userId, payload: pc.localDescription }));
                        console.log(`[屏幕共享] 已发送 screen-offer 给 ${userId}`);
                    })
                    .catch(e => console.log(`[屏幕共享] offer创建失败:`, e));
            }

            return pc;
        }

        async function handleScreenOffer(from, payload) {
            console.log(`[屏幕共享] 收到来自 ${from} 的 screen-offer`);
            console.log(`[屏幕共享] offer包含视频=${payload.sdp.includes('m=video')}`);
            document.getElementById('screenShareArea').classList.add('active');
            const pc = createScreenPC(from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(payload));
            console.log(`[屏幕共享] 远程描述已设置`);
            const answer = await pc.createAnswer();
            console.log(`[屏幕共享] answer创建成功, sdp长度=${answer.sdp.length}`);
            const hasVideo = answer.sdp.includes('m=video');
            const videoLine = answer.sdp.split('\r\n').find(l => l.startsWith('m=video'));
            console.log(`[屏幕共享] answer包含视频=${hasVideo}`);
            if (videoLine) console.log(`[屏幕共享] answer视频行: ${videoLine}`);
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({ type: 'screen-answer', to: from, payload: pc.localDescription }));
            console.log(`[屏幕共享] 已发送 screen-answer 给 ${from}`);
        }

        async function handleScreenAnswer(from, payload) {
            console.log(`[屏幕共享] 收到来自 ${from} 的 screen-answer`);
            console.log(`[屏幕共享] answer sdp=${payload.sdp.substring(0, 100)}...`);
            const pc = screenPCs[from];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(payload));
                console.log(`[屏幕共享] screen-answer 设置成功`);
            } else {
                console.log(`[屏幕共享] 未找到 screenPC for ${from}`);
            }
        }

        async function handleScreenIce(from, payload) {
            console.log(`[屏幕共享] 收到ICE from ${from}: ${payload.type} ${payload.protocol || ''}`);
            const pc = screenPCs[from];
            if (pc) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(payload));
                    console.log(`[屏幕共享] ICE 添加成功 from ${from}`);
                } catch(e) {
                    console.log(`[屏幕共享] ICE 添加失败:`, e);
                }
            } else {
                console.log(`[屏幕共享] screen-ice 时未找到 screenPC for ${from}`);
            }
        }

        function showRemoteScreen(userId, stream) {
            console.log(`[屏幕共享] showRemoteScreen called: ${userId}, stream id: ${stream.id}, tracks: ${stream.getTracks().length}`);
            stream.getTracks().forEach(t => console.log(`[屏幕共享] 轨道: kind=${t.kind}, enabled=${t.enabled}`));
            
            const grid = document.getElementById('videoGrid');
            let wrapper = document.getElementById('remote-video-' + userId);
            if (!wrapper) {
                wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper remote-video-wrapper';
                wrapper.id = 'remote-video-' + userId;
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsinline = true;
                video.muted = false; // 确保不静音以允许播放
                video.style.width = '100%';
                video.style.maxHeight = '220px';
                const label = document.createElement('span');
                label.className = 'video-label';
                label.textContent = userId + ' 的屏幕';
                wrapper.appendChild(video);
                wrapper.appendChild(label);
                grid.appendChild(wrapper);
                console.log(`[屏幕共享] 创建新视频元素 for ${userId}`);
            }
            const videoEl = wrapper.querySelector('video');
            videoEl.srcObject = stream;
            
            // 确保视频播放
            videoEl.play().then(() => {
                console.log(`[屏幕共享] 视频播放成功 for ${userId}`);
            }).catch(e => {
                console.log(`[屏幕共享] play() 失败:`, e);
                // 尝试点击播放
                videoEl.play().catch(() => {});
            });
            
            document.getElementById('screenShareArea').classList.add('active');
        }

        function removeRemoteScreen(userId) {
            const wrapper = document.getElementById('remote-video-' + userId);
            if (wrapper) wrapper.remove();
            if (screenPCs[userId]) {
                screenPCs[userId].close();
                delete screenPCs[userId];
            }
            // 如果本地也没在共享，收起区域
            if (!isSharing && document.querySelectorAll('.remote-video-wrapper').length === 0) {
                document.getElementById('screenShareArea').classList.remove('active');
            }
        }

        // ========== 远程控制 ==========
        function toggleControl() {
            if (controlEnabled) {
                disableControl();
            } else {
                enableControl();
            }
        }

        function enableControl() {
            controlEnabled = true;
            updateControlButton();
            console.log('[远程控制] 已启用，等待手机端连接...');
        }

        function disableControl() {
            controlEnabled = false;
            updateControlButton();
            console.log('[远程控制] 已禁用');
        }

        function updateControlButton() {
            const btn = document.getElementById('controlBtn');
            if (btn) {
                if (controlEnabled) {
                    btn.textContent = '⏹️ 停止远程控制';
                    btn.classList.remove('btn-secondary');
                    btn.classList.add('btn-danger');
                } else {
                    btn.textContent = '🖱️ 允许远程控制';
                    btn.classList.remove('btn-danger');
                    btn.classList.add('btn-secondary');
                }
            }
        }

        function executeControl(data) {
            if (!controlEnabled) {
                console.log('[远程控制] 控制未启用');
                return;
            }
            
            console.log('[远程控制] 执行操作:', data.action, data);
            
            // 坐标转换：相对坐标(0-1) -> 像素坐标
            let controlData = { ...data };
            if (data.action === 'mousemoveabs' && typeof data.x === 'number' && typeof data.y === 'number') {
                // 获取屏幕分辨率
                const screenWidth = window.screen.width;
                const screenHeight = window.screen.height;
                controlData.pixelX = Math.round(data.x * screenWidth);
                controlData.pixelY = Math.round(data.y * screenHeight);
                console.log(`[远程控制] 坐标转换: (${data.x}, ${data.y}) -> (${controlData.pixelX}, ${controlData.pixelY}), 屏幕: ${screenWidth}x${screenHeight}`);
            }
            
            // 发送HTTP请求到控制脚本
            fetch('http://localhost:9222/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(controlData)
            }).catch(err => console.log('[远程控制] 控制请求失败:', err));
        }

        function handleControl(action, data) {
            if (!controlEnabled) {
                console.log('[远程控制] 收到控制命令，但控制未启用:', action);
                return;
            }
            console.log('[远程控制] 收到控制命令:', action, data);
            executeControl(data);
        }

        // ========== UI 更新 ==========
        function updateUsersList(users) {
            usersList.innerHTML = '';
            users.forEach(userId => addUserToList(userId));
        }

        function addUserToList(userId) {
            if (document.getElementById('user-' + userId)) return;

            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = 'user-' + userId;
            div.innerHTML = `
                <div class="user-avatar">👤</div>
                <div class="user-name">${userId}</div>
                <div class="mic-indicator" id="indicator-${userId}"></div>
            `;
            usersList.appendChild(div);
        }

        function removeUserFromList(userId) {
            const el = document.getElementById('user-' + userId);
            if (el) el.remove();
        }

        // ========== 通话控制 ==========
        document.getElementById('joinBtn').addEventListener('click', joinRoom);
        document.getElementById('leaveBtn').addEventListener('click', leaveRoom);

        document.getElementById('shareBtn').addEventListener('click', () => {
            if (isSharing) {
                stopScreenShare();
            } else {
                startScreenShare();
            }
        });

        document.getElementById('controlBtn').addEventListener('click', toggleControl);

        document.getElementById('muteBtn').addEventListener('click', () => {
            if (!localStream) return;

            if (isMuted) {
                localStream.getAudioTracks().forEach(track => track.enabled = true);
                document.getElementById('muteBtn').textContent = '🔇 静音';
                document.getElementById('muteBtn').classList.remove('btn-danger');
                document.getElementById('muteBtn').classList.add('btn-secondary');
            } else {
                localStream.getAudioTracks().forEach(track => track.enabled = false);
                document.getElementById('muteBtn').textContent = '🔊 取消静音';
                document.getElementById('muteBtn').classList.remove('btn-secondary');
                document.getElementById('muteBtn').classList.add('btn-danger');
            }
            isMuted = !isMuted;
        });

        document.getElementById('callBtn').addEventListener('click', async () => {
            // 向所有在线用户发起通话
            const users = usersList.querySelectorAll('.user-item');
            if (users.length === 0) {
                alert('房间里没有其他用户');
                return;
            }

            users.forEach(userEl => {
                const userId = userEl.querySelector('.user-name').textContent;
                if (!peerConnections[userId]) {
                    createPeerConnection(userId, true);
                }
            });

            statusEl.textContent = '正在呼叫...';
        });

        // 自动连接
        connect();

        // 页面卸载时离开
        window.addEventListener('beforeunload', leaveRoom);
    </script>
